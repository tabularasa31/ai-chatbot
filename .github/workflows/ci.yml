name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      pgvector: ${{ steps.filter.outputs.pgvector }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'tests/**'
              - 'requirements.txt'
              - 'alembic/**'
            frontend:
              - 'frontend/**'
            pgvector:
              - 'backend/search/**'
              - 'backend/embeddings/**'
              - 'backend/models.py'
              - 'backend/gap_analyzer/**'
              - 'backend/contact_sessions/**'
              - 'alembic/**'
              - 'tests/pgvector_tests/**'
              - 'tests/eval/multi_hop/**'

  backend:
    name: Backend (pytest + ruff)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///:memory:?check_same_thread=False
      JWT_SECRET: test-secret-key-min-32-chars-long!!
      ENVIRONMENT: test
      ENCRYPTION_KEY: 7b4_zUZivxPZWzIkXbVf3dpQX9Ab22HB51H9Qcrjya8=
      OPENAI_API_KEY: sk-test
      FRONTEND_URL: http://localhost:3000
      BREVO_API_KEY: test-key
      EMAIL_FROM: test@example.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check backend

      - name: Check no deprecated callers
        run: make lint-deprecated

      - name: Run tests (SQLite)
        run: pytest tests/ -q --ignore=tests/pgvector_tests --ignore=tests/eval/multi_hop --cov=backend --cov-report=term-missing

  backend-pgvector:
    name: Backend pgvector (pg integration tests)
    needs: changes
    if: needs.changes.outputs.pgvector == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_pgvector
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/test_pgvector
      JWT_SECRET: test-secret-key-min-32-chars-long!!
      ENVIRONMENT: test
      ENCRYPTION_KEY: 7b4_zUZivxPZWzIkXbVf3dpQX9Ab22HB51H9Qcrjya8=
      OPENAI_API_KEY: sk-test
      FRONTEND_URL: http://localhost:3000
      BREVO_API_KEY: test-key
      EMAIL_FROM: test@example.com
      PG_HOST: localhost
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: password

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pgvector tests (PostgreSQL)
        run: pytest tests/pgvector_tests/ tests/eval/multi_hop/ -m pgvector -q

  frontend:
    name: Frontend (eslint + build)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Guard against raw fetch to backend
        run: |
          # Catch client-side fetch() calls using BASE_URL outside the helper file.
          # Server-side API routes (API_URL) are intentionally excluded.
          if grep -rn 'fetch(`\${BASE_URL}' --include="*.ts" --include="*.tsx" frontend/ \
              | grep -v "^frontend/lib/api\.ts:"; then
            echo "ERROR: raw fetch() using BASE_URL found outside frontend/lib/api.ts — use apiFetch() instead."
            exit 1
          fi

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Build
        working-directory: frontend
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: https://ci.invalid
