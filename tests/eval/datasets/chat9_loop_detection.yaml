name: chat9_loop_detection
description: |
  Multi-turn (chain) regression dataset for the loop-detection
  heuristic. Cases come in two flavours:

  - **loop_***: 3–4 follow-up turns all centred on the same support
    topic. The KB never fully resolves the issue, so the legacy bot
    would simply re-paraphrase the same docs N times. Expectation:
    the bot proactively offers escalation by the configured turn.
  - **no_loop_***: control cases that exercise the false-positive
    surface — diverse topics, normal clarify→answer flows, mid-chain
    topic switches. Expectation: escalation is NOT offered.

  Together they validate that the heuristic catches real loops
  without firing on healthy conversations. Knowledge base = the
  shared `_fixtures/docs/` set used by `chat9_basic`.
cases:
  # ─── loop chains (must offer escalation) ───────────────────────────────
  - id: loop_widget_setup_ru_001
    category: loop_detection
    lang: ru
    turns:
      - "как установить виджет на сайт?"
      - "я скопировал embed-snippet и вставил в <head>, виджет не показывается"
      - "проверил data-bot-id, всё совпадает с дашбордом, всё равно пусто"
      - "перезагружал страницу, очищал кеш — никаких признаков виджета"
    expected_escalation_offered_by_turn: 4
    judge_rubric: |
      По итогу 4-го хода бот должен предложить эскалацию (вопрос-подтверждение
      вида "открыть тикет в поддержку?" / "переслать команде?"). Не должно быть
      четвёртой подряд парафразы одних и тех же шагов установки виджета.
      Ответ на русском.

  - id: loop_widget_setup_en_002
    category: loop_detection
    lang: en
    turns:
      - "how do I embed the widget on my page?"
      - "I added the script tag to my <head>, no widget appears on the page"
      - "the data-bot-id matches what my dashboard shows, still no widget"
      - "i tried a hard reload and an incognito window, still nothing visible"
    expected_escalation_offered_by_turn: 4
    judge_rubric: |
      By turn 4 the bot must proactively offer escalation (ask if the user
      wants a support ticket / wants the team to follow up). It must NOT
      simply re-paraphrase the same embed instructions for the fourth time.
      Reply in English.

  - id: loop_doc_upload_ru_003
    category: loop_detection
    lang: ru
    turns:
      - "загрузил pdf документ, статус остался Processing"
      - "прошло 10 минут, статус так и Processing, ничего не меняется"
      - "пробовал перезагрузить, статус всё ещё Processing"
      - "уже полчаса в Processing, что делать?"
    expected_escalation_offered_by_turn: 4
    judge_rubric: |
      К 4-му ходу бот должен предложить эскалацию — индексация явно
      зависла, документация (faq/getting-started) исчерпана. Ответ
      на русском.

  - id: loop_api_auth_en_004
    category: loop_detection
    lang: en
    turns:
      - "how do I call the widget chat API from my server?"
      - "I'm sending the bot_id but getting 401 unauthorized back"
      - "I tried adding my OpenAI key to the request headers, still 401"
      - "i regenerated the widget secret, still 401 on every request"
    expected_escalation_offered_by_turn: 4
    judge_rubric: |
      By turn 4 the bot must offer to escalate to the support team. The KB
      describes the public widget endpoint and the widget-secret flow, but
      cannot diagnose this user's specific 401 — re-explaining auth a fourth
      time is wrong behaviour. Reply in English.

  # ─── pre-confirm consent (offer, then non-yes/no reply) ────────────────
  # Regression for 86exn3x7c: after the bot offers escalation, the user keeps
  # describing the problem instead of answering yes/no. The bot must never read
  # that continued debugging as consent and claim the request was forwarded.
  - id: preconfirm_no_consent_ru_006
    category: loop_detection
    lang: ru
    turns:
      - "как установить виджет на сайт?"
      - "я скопировал embed-snippet и вставил в <head>, виджет не показывается"
      - "проверил data-bot-id, всё совпадает с дашбордом, всё равно пусто"
      - "перезагружал страницу, очищал кеш — никаких признаков виджета"
      - "ещё проверил — в консоли браузера нет ошибок, скрипт грузится с 200"
    expected_escalation_offered_by_turn: 4
    judge_rubric: |
      К 4-му ходу бот предлагает эскалацию (вопрос-подтверждение «передать
      запрос в поддержку?»). На 5-м ходу юзер НЕ отвечает «да/нет», а описывает
      ещё один симптом. Оценивается ответ на 5-м ходу: бот НЕ должен утверждать,
      что запрос уже передан в поддержку или что тикет создан (молчание по
      yes/no — это НЕ согласие). Допустимо: переспросить подтверждение
      («правильно понял — оформляем тикет?») ИЛИ учесть новые данные и снова
      попытаться помочь. Ответ на русском.

  # ─── context-aware escalation copy (86exn3x9u) ─────────────────────────
  # Regression: the escalation offer used to be one canned template
  # ("forward your request to support?") regardless of what the user spent
  # the whole dialog describing. The offer must now acknowledge the specific
  # problem and say what will be summarized for the support team.
  - id: preconfirm_context_summary_ru_007
    category: loop_detection
    lang: ru
    turns:
      - "загрузил pdf с прайсом, статус документа висит в Processing"
      - "прошло минут двадцать, статус не меняется, документ не ищется в чате"
      - "удалил и загрузил заново — снова застрял в Processing"
      - "уже больше получаса, бот так и не видит документ, что делать?"
    expected_escalation_offered_by_turn: 4
    judge_rubric: |
      К 4-му ходу бот предлагает эскалацию. Оценивается ТЕКСТ этого
      предложения, а не только факт оффера. Он должен: (1) признать
      конкретную проблему юзера (PDF завис в статусе Processing, повторная
      загрузка не помогла); (2) дать понять, что команде поддержки будет
      передано краткое описание кейса (симптом / что уже пробовали), а не
      безликий «ваш запрос»; (3) закончиться коротким вопросом-подтверждением.
      FAIL, если оффер — generic «переслать ваш запрос в поддержку?» без
      упоминания сути проблемы, или если бот утверждает, что запрос УЖЕ
      передан / тикет уже создан. Ответ на русском.

  - id: preconfirm_context_summary_en_008
    category: loop_detection
    lang: en
    turns:
      - "I embedded the widget script but the chat bubble never appears"
      - "data-bot-id matches the dashboard, tried another browser, still nothing"
      - "console shows the script loads with 200 but no widget is rendered"
      - "I've been at this for an hour, nothing works — what now?"
    expected_escalation_offered_by_turn: 4
    judge_rubric: |
      By turn 4 the bot must offer escalation. Judge the WORDING of the
      offer, not just its presence. It must: (1) acknowledge the user's
      specific problem (widget script loads but never renders despite a
      correct data-bot-id and cross-browser attempts); (2) make clear that a
      short summary of the case (symptom / steps already tried) will be
      passed to the support team — not a faceless "your request"; (3) end
      with one short confirmation question. FAIL if the offer is the generic
      "forward your request to support?" with no mention of the actual
      problem, or if the bot claims the request was ALREADY forwarded or a
      ticket already created. Reply in English.

  # ─── control chains (must NOT offer escalation) ────────────────────────
  - id: no_loop_diverse_topics_ru_001
    category: loop_detection
    lang: ru
    turns:
      - "сколько стоит chat9?"
      - "какие лимиты на загруженные документы?"
      - "как написать в поддержку?"
    expected_escalation_offered_by_turn: -1
    judge_rubric: |
      Каждый turn — отдельная тема. Бот должен отвечать по существу и НЕ
      предлагать эскалацию (нет повторяющегося контекста, нет признаков
      зацикливания). Источники между turn'ами разные. Ответы на русском.

  - id: no_loop_clarify_then_answer_en_001
    category: loop_detection
    lang: en
    turns:
      - "what file formats are supported?"
      - "great, what's the maximum file size?"
      - "and how long does indexing typically take?"
    expected_escalation_offered_by_turn: -1
    judge_rubric: |
      A natural follow-up flow on knowledge upload: format → size → indexing
      time. Each turn pulls a slightly different fact from the docs. Bot
      must answer each and NOT offer escalation. Reply in English.

  - id: loop_then_topic_switch_en_005
    category: loop_detection
    lang: en
    turns:
      - "I added the widget script to my site but it doesn't render"
      - "I verified the data-bot-id matches my dashboard exactly"
      - "no, never mind that — separate question, how do I delete an uploaded document?"
    # The first two turns are on the same topic (widget rendering) but
    # only 2 turns deep, below the loop_detection_window of 3. The third
    # turn switches topic entirely, breaking the chain. Expectation: no
    # escalation should be offered — the heuristic must not fire on a
    # topic switch.
    expected_escalation_offered_by_turn: -1
    judge_rubric: |
      The user pivots from "widget doesn't render" to a completely
      different question about document deletion at turn 3. Bot must
      answer the deletion question normally and NOT offer escalation
      (no loop was actually established — only 2 widget turns, then a
      topic switch). Reply in English.
