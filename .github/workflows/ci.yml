name: CI

on:
  push:
    branches: [main, deploy]
  pull_request:
    branches: [main, deploy]

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_pgvector
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: sqlite:///:memory:?check_same_thread=False
      JWT_SECRET: test-secret-key-min-32-chars-long!!
      EVAL_JWT_SECRET: test-eval-jwt-secret-min-32-chars-long!!
      ENVIRONMENT: test
      ENCRYPTION_KEY: 7b4_zUZivxPZWzIkXbVf3dpQX9Ab22HB51H9Qcrjya8=
      OPENAI_API_KEY: sk-test
      FRONTEND_URL: http://localhost:3000
      BREVO_API_KEY: test-key
      EMAIL_FROM: test@example.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check backend

      - name: Lint naming on active documents modules
        run: ruff check backend/documents/url_service.py backend/documents/parsers.py --select N

      - name: Run tests (SQLite)
        run: pytest tests/ -q --ignore=tests/pgvector_tests --cov=backend --cov-report=term-missing

      - name: Run pgvector tests (PostgreSQL)
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: postgres
          PG_PASSWORD: password
        run: pytest tests/pgvector_tests/ -m pgvector -q

  frontend:
    name: Frontend (eslint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://ci.invalid
