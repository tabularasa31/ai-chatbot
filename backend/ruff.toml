line-length = 100
target-version = "py311"

# Alembic revisions: unused imports / whitespace are common; plan defers migration edits for CI.
extend-exclude = ["migrations"]

[lint]
# E/F/W + naming (N): keeps backend style checks broad without requiring import reordering.
# Run `ruff check backend --select I --fix` when you want to normalize imports.
select = ["E", "F", "W", "N", "I", "B", "UP", "RUF"]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # function-call-in-default-argument — standard FastAPI Depends() pattern
    "UP042",  # replace-str-enum — behavioural change, requires dedicated migration
]

[lint.per-file-ignores]
# Imports after module-level setup (logging / constants) are intentional.
"main.py" = ["E402"]
"chat/service.py" = ["E402"]
# Multilingual data (affirmations, regex char classes) intentionally mixes
# Cyrillic / Latin / typographic characters that trip RUF001/003.
"chat/followup.py" = ["RUF001", "RUF003"]
