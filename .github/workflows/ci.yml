name: CI

on:
  push:
    branches: [main, deploy]
  pull_request:
    branches: [main, deploy]

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///:memory:?check_same_thread=False
      JWT_SECRET: test-secret-key-min-32-chars-long!!
      ENVIRONMENT: test
      ENCRYPTION_KEY: 7b4_zUZivxPZWzIkXbVf3dpQX9Ab22HB51H9Qcrjya8=
      OPENAI_API_KEY: sk-test
      FRONTEND_URL: http://localhost:3000
      BREVO_API_KEY: test-key
      EMAIL_FROM: test@example.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint with ruff
        run: ruff check backend

      - name: Run tests
        run: pytest tests/ -q --cov=backend --cov-report=term-missing

  frontend:
    name: Frontend (eslint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://ci.invalid
